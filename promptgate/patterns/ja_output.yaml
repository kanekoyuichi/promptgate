system_prompt_leak:
  # LLM がシステムプロンプトの内容を直接開示しようとする文のみ検出する。
  # 「指示に基づいて〜します」「設定されています」などの通常のメタコメントは対象外。
  # 開示意図が明確な文（「以下が〜です」「全文を共有」等）に限定する。
  - "以下が私の(?:システムプロンプト|プロンプト|指示内容|設定内容)(?:です|になります)"
  - "私の(?:システムプロンプト|プロンプト)(?:の全文|全体|をそのまま)"
  - "(?:システムプロンプト|指示内容)(?:の全文|全体)(?:は以下|を以下|を次)"
  - "私のプロンプト(?:は以下の通り|をそのままお伝え|を共有)"

pii_leak:
  # メールアドレス — example.com / test.com 等のダミードメインは除外する。
  # ドキュメントや説明文に頻出するプレースホルダーによる誤検知を防ぐ。
  - "[A-Za-z0-9._%+]+@(?!(?:example|test|sample|dummy|foo|bar|localhost)\\b)[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
  # 日本の携帯電話番号 — 区切り文字あり形式のみ。
  # 区切りなし形式 (0[789]0\d{8}) は連続数字テキストで誤検知しやすいため除外。
  - "0[789]0-\\d{4}-\\d{4}"
  # クレジットカード番号 — 主要ブランドのプレフィックス + 区切り文字あり形式。
  # \d{16} は追跡番号・製品 ID・タイムスタンプ等に広くマッチするため使わない。
  # \d{4}-\d{4}-\d{4}-\d{4} も同様に削除し、カードプレフィックス制約を必須とする。
  - "\\b(?:4\\d{3}|5[1-5]\\d{2}|3[47]\\d{2}|6011)[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b"

credential_leak:
  - "(?i)api.?key[:\\s=]+[A-Za-z0-9_.+/-]{16,}"
  - "(?i)access.?token[:\\s=]+[A-Za-z0-9_.+/-]{16,}"
  - "(?i)secret.?key[:\\s=]+[A-Za-z0-9_.+/-]{16,}"
  - "(?i)password[:\\s=]+\\S{8,}"
  - "(?i)Bearer\\s+[A-Za-z0-9_.]{20,}"
  - "sk-[A-Za-z0-9]{20,}"
  - "ghp_[A-Za-z0-9]{36}"
  - "-----BEGIN .{0,20}PRIVATE KEY-----"
