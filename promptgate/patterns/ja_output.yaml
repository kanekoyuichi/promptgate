system_prompt_leak:
  - "私のシステムプロンプト(?:は|には|では)"
  - "私(?:への|の)(?:システム)?指示(?:は|には|によると|では)"
  - "システムプロンプトを(?:見せ|出力|公開|教え)"
  - "私は(?:次のように|以下のように)(?:設定|指示|構成)されています"
  - "以下が私の(?:システムプロンプト|指示|設定)です"
  - "私の(?:初期|元の)指示(?:は|には|によると)"
  - "私はこのように(?:設定|指示)されています"

pii_leak:
  - "[A-Za-z0-9._%+]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
  - "0[789]0\\d{4}\\d{4}"
  - "0[789]0-\\d{4}-\\d{4}"
  - "\\d{4}-\\d{4}-\\d{4}-\\d{4}"
  - "\\d{16}"

credential_leak:
  - "(?i)api.?key[:\\s=]+[A-Za-z0-9_.+/-]{16,}"
  - "(?i)access.?token[:\\s=]+[A-Za-z0-9_.+/-]{16,}"
  - "(?i)secret.?key[:\\s=]+[A-Za-z0-9_.+/-]{16,}"
  - "(?i)password[:\\s=]+\\S{8,}"
  - "(?i)Bearer\\s+[A-Za-z0-9_.]{20,}"
  - "sk-[A-Za-z0-9]{20,}"
  - "ghp_[A-Za-z0-9]{36}"
  - "-----BEGIN .{0,20}PRIVATE KEY-----"
