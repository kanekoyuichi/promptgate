name: Embedding Integration Tests

# 実モデルを使った EmbeddingDetector の統合テスト。
# sentence-transformers と torch を要するため通常の CI とは分離する。
#
# 実行タイミング:
#   - embedding.py またはテストファイルの変更時（PR / push）
#   - 毎週月曜 9:00 JST（定期的な実動作確認）
#   - 手動実行

on:
  push:
    paths:
      - "src/promptgate/detectors/embedding.py"
      - "tests/test_embedding.py"
  pull_request:
    paths:
      - "src/promptgate/detectors/embedding.py"
      - "tests/test_embedding.py"
  schedule:
    - cron: "0 0 * * 1"  # 毎週月曜 00:00 UTC (09:00 JST)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: st-model-paraphrase-multilingual-MiniLM-L12-v2

      - name: Install dependencies
        run: |
          pip install -e ".[dev,embedding]"

      - name: Run embedding integration tests
        run: |
          pytest tests/test_embedding.py -v
