direct_injection:
  # "ignore [all/the/any/your/prior/previous/above/earlier] instructions/rules/..."
  # handles: "ignore previous instructions", "ignore all previous instructions", etc.
  - "\\bignore\\b(?:\\s+(?:all|the|any|your|these|those|prior|previous|above|earlier|my)){0,3}\\s+(?:instructions?|rules?|guidelines?|prompts?|commands?|directives?)"
  # "disregard [qualifiers] instructions/rules/..."
  # handles: "disregard your guidelines", "disregard all previous rules", etc.
  - "\\bdisregard\\b(?:\\s+(?:all|the|any|your|these|those|prior|previous|above|earlier)){0,3}\\s+(?:instructions?|rules?|guidelines?|prompts?|commands?|directives?)"
  # "forget [qualifiers] instructions/..." or "forget everything you were told"
  - "\\bforget\\b(?:\\s+(?:all|the|any|your|these|those|prior|previous|above|earlier|everything)){0,3}\\s+(?:instructions?|rules?|guidelines?|prompts?|commands?)"
  - "\\bforget\\s+everything\\s+(?:you\\s+(?:were|have\\s+been)\\s+(?:told|given|asked|taught)|above)"
  # "from now on, you are / your role is / ..." — common role-override opener
  - "\\bfrom\\s+now\\s+on[,:]?\\s+(?:you\\s+(?:are|will|must|should|can|have\\s+to)|your\\s+(?:role|task|name|instructions?|identity|purpose)|pretend|ignore|act|behave|respond)"
  # "your new instructions / new task: ..."
  - "\\byour\\s+new\\s+(?:instructions?|task|role|objective|directive)\\b"
  - "\\bnew\\s+instructions?\\s*:"
  # "override [qualifiers] instructions/..."
  - "\\boverride\\b(?:\\s+(?:all|the|any|your|these|those|prior|previous)){0,3}\\s+(?:instructions?|rules?|guidelines?|prompts?|commands?|directives?)"
  - "\\byou\\s+are\\s+no\\s+longer\\b"
  - "\\bact\\s+as\\s+if\\s+you\\b"
  - "\\byou\\s+are\\s+now\\s+(?:a\\b|an\\b|in\\b|acting|playing|going|required|supposed)"

jailbreak:
  - "\\bDAN\\s+mode\\b"
  - "\\bdo\\s+anything\\s+now\\b"
  - "\\bjailbreak\\b"
  - "\\bno\\s+restrictions\\b"
  - "\\bwithout\\s+(?:any\\s+)?(?:limitations|restrictions)\\b"
  - "\\bbypass\\s+(?:your\\s+)?(?:filters|restrictions|safety)"
  - "pretend you have no"
  # "pretend to be / pretend you are [something without restrictions]"
  - "\\bpretend\\s+(?:to\\s+be|you\\s+are)\\b"
  # "imagine you have no restrictions / you are free / you can ..."
  - "\\bimagine\\s+you\\s+(?:have\\s+no|are\\s+free|can\\b)"
  - "your true self"
  - "\\bevil\\s+mode\\b"
  - "\\bdeveloper\\s+mode\\b"
  # "you are no longer an AI / assistant / bot"
  - "\\bno\\s+longer\\s+(?:an?\\s+)?(?:AI|assistant|bot|model|chatbot)\\b"

data_exfiltration:
  - "show me your system prompt"
  - "what is your system prompt"
  # "reveal/output/display/share your instructions/prompt/rules/..."
  - "\\b(?:reveal|output|display|share|print|dump)\\s+your\\s+(?:instructions?|prompt|rules?|guidelines?|configuration|context)"
  - "what are your (?:hidden\\s+)?(?:instructions?|rules?|guidelines?)"
  - "tell me your (?:instructions?|prompt|rules?|guidelines?)"

indirect_injection:
  - "<!--"
  - "\\[INST\\]"
  - "<instructions>"
  - "\\{\\{"
  - "<system>"
  # Closing tags used to escape XML wrapper defenses (e.g. </user_input>, </human>)
  - "</system>"
  - "</instructions>"
  - "</(?:user[-_]?input|human|query|prompt|assistant)>"
  - "]]>"

code_execution_induction:
  - "__import__\\s*\\("
  - "\\bexec\\s*\\("
  - "\\beval\\s*\\("
  - "subprocess\\.(?:run|call|Popen|check_output)\\s*\\("
  - "os\\.(?:system|popen|execvp?)\\s*\\("
  - "';\\s*DROP\\s+TABLE"
  - "';\\s*DELETE\\s+FROM"
  - "\\bUNION\\s+(?:ALL\\s+)?SELECT\\b"
  - ";\\s*rm\\s+-[rf]"
  - ";\\s*(?:curl|wget)\\s"

prompt_leaking:
  - "repeat your instructions"
  - "output your system message"
  - "what were you told"
  - "tell me your prompt"
  - "show your context"
  # "what were/are your initial/original/first instructions/prompt/..."
  - "what\\s+(?:were|are)\\s+your\\s+(?:initial|original|first|starting)\\s+(?:instructions?|prompt|rules?|guidelines?)"
  # "reproduce/copy your instructions/system message/..."
  - "\\b(?:reproduce|copy)\\s+your\\s+(?:instructions?|prompt|system\\s+(?:message|prompt))"
